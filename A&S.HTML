<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>A&SBijoux</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f9f6f2;
}

header {
    background-color: #c70e6b;
    color: white;
    padding: 20px;
    text-align: center;
}

nav {
    background-color: #222;
    text-align: center;
    padding: 10px;
}

nav a {
    color: white;
    text-decoration: none;
    margin: 15px;
    font-weight: bold;
}

nav a:hover {
    color: #d41967;
}

.hero {
    text-align: center;
    padding: 40px 20px;
    background-color: #fff;
}

.products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
}

.card {
    background: white;
    width: 250px;
    margin: 15px;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    text-align: center;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.price {
    color: #ac2076;
    font-weight: bold;
    font-size: 18px;
}

button {
    background-color: #b90c80;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background-color: #da1a7a;
}

/* POPUP FORMULAIRE */
.popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
}

.form-box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 320px;
}

.form-box input,
.form-box select {
    width: 100%;
    padding: 8px;
    margin: 8px 0;
}

.close-btn {
    background: red;
    margin-top: 10px;
}

footer {
    background-color: #222;
    color: white;
    text-align: center;
    padding: 15px;
    margin-top: 30px;
}

/* RESPONSIVE MOBILE */
@media (max-width: 768px) {

.products {
    flex-direction: column;
    align-items: center;
}

.card {
    width: 90%;
}

.form-box {
    width: 90%;
}

}
</style>
</head>

<body>

<header>
    <h1>A&SBijoux</h1>
    <p>Élégance & Raffinement</p>
</header>

<nav>
    <a href="#">Accueil</a>
    <a href="#">Produits</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <h2>Découvrez notre nouvelle collection</h2>
    <p>Bijoux modernes et élégants pour toutes les occasions.</p>
</section>

<section class="products">

    <div class="card">
        <img src="bijou 1.jpeg" alt="Bracelet Élégant">
        <h3>Bracelet Élégant</h3>
        <p class="price">50 MAD</p>
        <button onclick="openForm('Bracelet Élégant - 50 MAD')">Acheter</button>
    </div>

    <div class="card">
        <img src="BIJOU 2.jpeg" alt="Bracelet Chaîne">
        <h3>Bracelet Chaîne</h3>
        <p class="price">50 MAD</p>
        <button onclick="openForm('Bracelet Chaîne - 50 MAD')">Acheter</button>
    </div>

    <div class="card">
        <img src="BIJOU 3.jpeg" alt="Ensemble de bijoux">
        <h3>Ensemble de bijoux</h3>
        <p class="price">100 MAD</p>
        <button onclick="openForm('Ensemble de bijoux - 100 MAD')">Acheter</button>
    </div>

</section>

<!-- FORMULAIRE -->
<div class="popup" id="popup">
    <div class="form-box">
        <h3>Formulaire de commande</h3>

        <input type="text" placeholder="Nom" required>
        <input type="text" placeholder="Prénom" required>
        <input type="tel" placeholder="Téléphone" required>
        <input type="text" placeholder="Adresse" required>

        <label>Choisir le produit :</label>
        <select id="productSelect">
            <option>Bracelet Élégant - 50 MAD</option>
            <option>Bracelet Chaîne - 50 MAD</option>
            <option>Ensemble de bijoux - 100 MAD</option>
        </select>

        <button onclick="confirmOrder()">Confirmer</button>
        <button class="close-btn" onclick="closeForm()">Fermer</button>
    </div>
</div>

<footer>
    © 2026 A&SBijoux - Tous droits réservés
</footer>

<script>
function openForm(product){
    document.getElementById("popup").style.display = "flex";
    document.getElementById("productSelect").value = product;
}

function closeForm(){
    document.getElementById("popup").style.display = "none";
}

function confirmOrder(){
    alert("Commande envoyée avec succès !");
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
